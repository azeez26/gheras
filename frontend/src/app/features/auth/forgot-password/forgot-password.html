<div class="auth-page">
    <div class="auth-visual">
        <div style="font-size:4rem;margin-bottom:1.5rem">🌿</div>
        <div
            style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;margin-bottom:.75rem;text-align:center">
            بياناتك في أمان</div>
        <div style="opacity:.8;text-align:center;max-width:300px;line-height:1.7">
            لا تقلق، يمكنك استعادة كلمة المرور بسهولة والمتابعة في العناية بنباتاتك.
        </div>
    </div>

    <div class="auth-form-side mt-5">
        <div class="auth-box">
            <div class="auth-logo">
                <img src="logo.png" alt="غراس" height="42">
                غِراس
            </div>
            <div class="auth-title">نسيت كلمة المرور</div>
            <div class="auth-sub" *ngIf="step === 1">أدخل بريدك الإلكتروني لاستلام كود الاستعادة</div>
            <div class="auth-sub" *ngIf="step === 2">أدخل الكود المرسل وكلمة المرور الجديدة</div>

            <div *ngIf="status === 'error'" class="alert alert-danger px-3 py-2 mb-3 small d-flex align-items-center">
                <span class="ms-2">⚠️</span> {{ errorMessage }}
            </div>

            <div *ngIf="successMessage" class="alert alert-success px-3 py-2 mb-3 small d-flex align-items-center">
                <span class="ms-2">✅</span> {{ successMessage }}
            </div>

            <form *ngIf="step === 1" (ngSubmit)="onSendCode()">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" class="input-field" [(ngModel)]="email" name="email"
                        placeholder="example@email.com" [disabled]="status === 'loading'">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="status === 'loading'">
                    <span *ngIf="status === 'loading'" class="spinner-border spinner-border-sm me-2"></span>
                    أرسل الكود
                </button>
            </form>

            <form *ngIf="step === 2" (ngSubmit)="onResetPassword()">
                <div class="input-group">
                    <label>كود التحقق</label>
                    <input type="text" class="input-field" [(ngModel)]="verificationCode" name="code"
                        placeholder="أدخل الكود" [disabled]="status === 'loading'">
                </div>
                <div class="input-group">
                    <label>كلمة المرور الجديدة</label>
                    <input type="password" class="input-field" [(ngModel)]="newPassword" name="password"
                        placeholder="••••••••" [disabled]="status === 'loading'">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg"
                    [disabled]="status === 'loading' || status === 'success'">
                    <span *ngIf="status === 'loading'" class="spinner-border spinner-border-sm me-2"></span>
                    حفظ كلمة المرور الجديدة
                </button>
            </form>

            <div class="divider">أو</div>

            <div style="text-align:center;font-size:.9rem;color:var(--neutral-500)">
                تذكرت كلمة المرور؟ <a routerLink="/login" style="color:var(--green-600);font-weight:700">سجّل الدخول</a>
            </div>
        </div>
    </div>
</div>
